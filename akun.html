<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akun Saya | Bakoel</title>
    
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <meta http-equiv="Strict-Transport-Security" content="max-age=31536000; includeSubDomains">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://*.onrender.com https://api.dicebear.com https://api.biteship.com https://nominatim.openstreetmap.org https://app.sandbox.midtrans.com; img-src 'self' data: https: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://app.sandbox.midtrans.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com; frame-src 'self' https://app.sandbox.midtrans.com;">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" crossorigin="anonymous" referrerpolicy="no-referrer">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --bg-color: #e0e5ec; --text-main: #2d3436; --text-muted: #636e72; --accent-color: #0984e3;
            --shadow-light: #ffffff; --shadow-dark: #a3b1c6;
            --neu-flat: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            --neu-pressed: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            --neu-flat-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-pressed-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        [data-theme="dark"] {
            --bg-color: #1a1b1e; --text-main: #f5f6fa; --text-muted: #a4b0be; --accent-color: #00e5ff;
            --shadow-light: rgba(255, 255, 255, 0.05); --shadow-dark: rgba(0, 0, 0, 0.6);
            --neu-flat: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
            --neu-pressed: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
            --neu-flat-sm: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            --neu-pressed-sm: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background-color 0.4s ease, color 0.4s ease; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; }

        .top-nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background-color: var(--bg-color); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .logo { font-size: 20px; font-weight: 700; color: var(--accent-color); letter-spacing: 2px; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        
        .controls { display: flex; align-items: center; gap: 20px; }
        .theme-switch { width: 60px; height: 30px; border-radius: 50px; background: var(--bg-color); box-shadow: var(--neu-pressed); position: relative; cursor: pointer; display: flex; align-items: center; padding: 4px; }
        .switch-handle { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-color); box-shadow: var(--neu-flat); position: absolute; left: 4px; transition: transform 0.4s ease; display: flex; justify-content: center; align-items: center; color: var(--accent-color); font-size: 10px; }
        [data-theme="dark"] .switch-handle { transform: translateX(30px); }

        .nav-link { color: var(--text-muted); text-decoration: none; position: relative; font-size: 24px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 8px; transition: color 0.3s ease; }
        .nav-link:hover { color: var(--accent-color); }
        
        .neu-btn-icon { background: var(--bg-color); color: var(--text-main); border: none; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; display: flex; justify-content: center; align-items: center; box-shadow: var(--neu-flat-sm); cursor: pointer; text-decoration: none; position: relative; }
        .neu-btn-icon:active { box-shadow: var(--neu-pressed-sm); color: var(--accent-color); }
        
        .badge-count { position: absolute; top: -6px; right: -10px; background: #ff4757; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 10px; border: 2px solid var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 10;}

        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; flex: 1; width: 100%; }
        .page-title { display: flex; align-items: center; gap: 15px; font-size: 24px; font-weight: 700; margin-bottom: 30px; }
        .btn-back { display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: var(--bg-color); color: var(--text-main); text-decoration: none; box-shadow: var(--neu-flat); transition: transform 0.2s; }
        .btn-back:active { box-shadow: var(--neu-pressed); color: var(--accent-color); }

        .profile-card { background: var(--bg-color); border-radius: 25px; padding: 40px; box-shadow: var(--neu-flat); display: flex; flex-direction: column; gap: 20px; align-items: center; margin-bottom: 40px;}
        
        .avatar-container { position: relative; margin-bottom: 10px; }
        .avatar-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; box-shadow: var(--neu-pressed); border: 4px solid var(--bg-color); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-top: 20px;}
        
        .input-group { display: flex; flex-direction: column; gap: 8px; text-align: left; position: relative;}
        .input-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-left: 5px; }
        .neu-input { width: 100%; padding: 15px 20px; border-radius: 15px; border: none; background: var(--bg-color); color: var(--text-main); box-shadow: var(--neu-pressed-sm); outline: none; font-size: 13px; font-weight: 600; transition: all 0.3s ease; }
        .neu-input:focus { box-shadow: var(--neu-pressed); }
        .neu-input:disabled { opacity: 0.7; cursor: not-allowed; }

        .full-width { grid-column: 1 / -1; }

        .action-buttons { display: flex; gap: 15px; width: 100%; margin-top: 20px; }
        .btn-primary { flex: 2; padding: 15px; border-radius: 50px; border: none; background: var(--bg-color); color: var(--accent-color); font-size: 14px; font-weight: 700; box-shadow: var(--neu-flat); cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.3s; }
        .btn-primary:active { box-shadow: var(--neu-pressed); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .btn-danger { flex: 1; padding: 15px; border-radius: 50px; border: none; background: var(--bg-color); color: #ff4757; font-size: 14px; font-weight: 700; box-shadow: var(--neu-flat); cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; transition: all 0.3s; }
        .btn-danger:active { box-shadow: var(--neu-pressed); }

        .alert-toast { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 12px 30px; border-radius: 50px; background: var(--bg-color); font-size: 13px; font-weight: 700; box-shadow: var(--neu-flat); display: none; z-index: 2000; align-items: center; gap: 10px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .bottom-nav { display: none; }

        @media (max-width: 768px) {
            .top-nav { padding: 15px 20px; }
            .hide-on-mobile { display: none !important; }
            .container { padding-bottom: 120px; margin-top: 15px; } 
            
            .profile-card { padding: 25px 20px; border-radius: 20px; }
            .form-grid { grid-template-columns: 1fr; gap: 15px; }
            .action-buttons { flex-direction: column; }
            
            .bottom-nav { 
                display: flex; position: fixed; bottom: 0; left: 0; width: 100%; 
                background-color: var(--bg-color); border-radius: 25px 25px 0 0; 
                box-shadow: 0 -8px 20px rgba(0,0,0,0.05); z-index: 999; 
                padding: 10px 15px; 
                justify-content: space-between; 
                padding-bottom: max(15px, env(safe-area-inset-bottom)); 
                gap: 8px; 
            }
            [data-theme="dark"] .bottom-nav { box-shadow: 0 -8px 20px rgba(0,0,0,0.4); }
            
            .bottom-nav-item { 
                flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
                text-decoration: none; color: var(--text-muted); font-size: 10px; font-weight: 600; 
                padding: 10px 0; border-radius: 18px; 
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); background: transparent; 
            }
            
            .bottom-nav-item i { font-size: 20px; margin-bottom: 4px; transition: transform 0.2s ease, color 0.2s ease; }
            .bottom-nav-item.active { color: var(--accent-color); background: var(--bg-color); box-shadow: var(--neu-pressed-sm); }
            .bottom-nav-item.active i { transform: scale(1.15); }
            
            .badge-container { position: relative; display: inline-flex; }
            .bottom-nav-item .badge-count { 
                position: absolute; top: -5px; right: -12px; background: #ff4757; color: white; 
                font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 10px; 
                border: 2px solid var(--bg-color); display: flex; justify-content: center; align-items: center; z-index: 2;
            }
        }
    </style>
<script src="analytics.js" async defer></script>     
</head>
<body>

        <div class="controls">
            <div class="theme-switch" id="themeToggle" title="Toggle Dark Mode"><div class="switch-handle"><i class="fas fa-sun" id="switchIcon"></i></div></div>
            
            <a href="promo.html" class="nav-link hide-on-mobile" title="Promo">

            <form id="profileForm" onsubmit="window.updateProfile(event)" style="width: 100%;">

    <script>
        // =========================================================================
        // SECURITY PATCH: KUNCI LINGKUNGAN JAVASCRIPT & SANITASI MUTLAK
        // Mencegah Prototype Pollution (#89), Clickjacking (#3), DOM Clobbering (#5)
        // =========================================================================
        "use strict";

        Object.freeze(Object.prototype);
        Object.freeze(Array.prototype);
        Object.freeze(String.prototype);

        if (window.top !== window.self) { 
            window.top.location = window.self.location; 
        }

        // Sanitasi Murni Anti XSS (#1) & HTML Injection (#4)
        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }

        function safeURL(url) {
            if (!url) return 'https://placehold.co/120x120/e0e5ec/a3b1c6?text=User';
            try {
                const parsedUrl = new URL(url, window.location.origin);
                if (['http:', 'https:'].includes(parsedUrl.protocol)) {
                    return escapeHTML(parsedUrl.href);
                }
            } catch (e) {
                const strUrl = String(url).trim();
                if (strUrl.startsWith('/') || strUrl.startsWith('./') || strUrl.startsWith('../')) {
                    return escapeHTML(strUrl);
                }
            }
            return 'https://placehold.co/120x120/e0e5ec/a3b1c6?text=User'; 
        }

        // =========================================================================
        // ARCHITECTURE PATCH: IIFE (Immediately Invoked Function Expression)
        // Mengisolasi logika dari ekstensi browser pencuri kredensial (#75)
        // =========================================================================
        (function() {
            const isLocalhost = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
            const BASE_URL = isLocalhost ? 'http://127.0.0.1:10000' : 'https://rusty-c22o.onrender.com';

            const sessionData = localStorage.getItem('user_session');
            if (!sessionData) { window.location.replace('login.html'); return; }
            
            let session;
            try {
                session = JSON.parse(sessionData);
                if (!session || !session.access_token) throw new Error();
            } catch(e) {
                localStorage.removeItem('user_session');
                window.location.replace('login.html');
                return;
            }

            // --- HPC UPGRADE 1: SISTEM CACHE MEMORI (Stale-While-Revalidate) ---
            const CACHE_TTL = 15 * 60 * 1000;
            function setLocalCache(key, data, customTTL = CACHE_TTL) {
                try { localStorage.setItem(key, JSON.stringify({ data: data, expiry: Date.now() + customTTL })); } catch (e) {}
            }
            function getLocalCache(key) {
                try {
                    const item = localStorage.getItem(key);
                    if (!item) return null;
                    const parsed = JSON.parse(item);
                    if (Date.now() > parsed.expiry) { localStorage.removeItem(key); return null; }
                    return parsed.data;
                } catch (e) { return null; }
            }

            const themeToggle = document.getElementById('themeToggle');
            const html = document.documentElement;
            if (localStorage.getItem('theme') === 'dark') { html.setAttribute('data-theme', 'dark'); document.getElementById('switchIcon').classList.replace('fa-sun', 'fa-moon'); }
            themeToggle.addEventListener('click', () => {
                const isDark = html.getAttribute('data-theme') === 'dark';
                html.setAttribute('data-theme', isDark ? 'light' : 'dark');
                localStorage.setItem('theme', isDark ? 'light' : 'dark');
                document.getElementById('switchIcon').classList.replace(isDark ? 'fa-moon' : 'fa-sun', isDark ? 'fa-sun' : 'fa-moon');
            });

            const alertToast = document.getElementById('alertToast');
            const alertIcon = document.getElementById('alertIcon');
            const alertMessage = document.getElementById('alertMessage');

            function showAlert(msg, type) {
                alertMessage.textContent = String(msg); // Anti XSS (textContent)
                if(type === 'success') {
                    alertIcon.innerHTML = '<i class="fas fa-check-circle" style="color: #27ae60;"></i>';
                    alertToast.style.color = '#27ae60';
                } else {
                    alertIcon.innerHTML = '<i class="fas fa-times-circle" style="color: #ff4757;"></i>';
                    alertToast.style.color = '#ff4757';
                }
                alertToast.style.display = 'flex';
                setTimeout(() => { alertToast.style.display = 'none'; }, 3000);
            }

            function updateAvatarUI(name) {
                const safeName = escapeHTML(name || "User");
                const avatarUrl = `https://api.dicebear.com/7.x/micah/svg?seed=${encodeURIComponent(safeName)}&backgroundColor=e0e5ec&baseColor=f9c9b6`;
                document.getElementById('userAvatar').src = safeURL(avatarUrl);
            }

            // =========================================================================
            // MENGUNCI FUNGSI-FUNGSI KRITIKAL DI OBJECT WINDOW
            // Anti DOM Clobbering (#5) & Mass Assignment Protection (#22)
            // =========================================================================
            Object.defineProperty(window, 'handleLogout', {
                value: function() { 
                    // MENGHAPUS SEMUA JEJAK PII (Data Theft from Web Storage #41)
                    localStorage.removeItem('user_session'); 
                    localStorage.removeItem('bakoel_cart_qty');
                    localStorage.removeItem('bakoel_promo_qty');
                    localStorage.removeItem('bakoel_order_qty');
                    localStorage.removeItem('bakoel_user_profile'); // Cache profil
                    window.location.replace('login.html'); 
                },
                writable: false,
                configurable: false
            });

            Object.defineProperty(window, 'updateProfile', {
                value: async function(event) {
                    event.preventDefault();
                    const btn = document.getElementById('btnSave');
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';
                    btn.disabled = true;

                    // SANITASI INPUT MUTLAK
                    const name = escapeHTML(document.getElementById('name').value.trim());
                    const nickname = escapeHTML(document.getElementById('nickname').value.trim());
                    const phone = escapeHTML(document.getElementById('phone').value.trim());
                    const kode_pos = escapeHTML(document.getElementById('kode_pos').value.trim());
                    const address = escapeHTML(document.getElementById('address').value.trim());

                    try {
                        const response = await fetch(`${BASE_URL}/api/user`, {
                            method: 'PUT',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${session.access_token}`
                            },
                            body: JSON.stringify({ 
                                nama_lengkap: name, 
                                nama_panggilan: nickname,
                                no_wa: phone,
                                kode_pos: kode_pos,
                                alamat_lengkap: address
                            })
                        });

                        const result = await response.json();
                        if (!response.ok) throw new Error(result.error || 'Gagal menyimpan profil');

                        const finalName = nickname || name.split(' ')[0] || "User";
                        updateAvatarUI(finalName); 
                        
                        session.name = finalName;
                        localStorage.setItem('user_session', JSON.stringify(session));
                        
                        // Perbarui cache profil
                        setLocalCache('bakoel_user_profile', {
                            nama_lengkap: name,
                            nama_panggilan: nickname,
                            no_wa: phone,
                            kode_pos: kode_pos,
                            alamat_lengkap: address,
                            email: document.getElementById('email').value
                        }, 30 * 60 * 1000);

                        showAlert("Profil berhasil diperbarui!", "success");
                    } catch (error) {
                        showAlert(error.message, "error");
                    } finally {
                        btn.innerHTML = '<i class="fas fa-save"></i> Simpan Profil';
                        btn.disabled = false;
                    }
                },
                writable: false,
                configurable: false
            });

            // =========================================================================
            // HPC UPGRADE 2: STALE-WHILE-REVALIDATE PROFILE SYNC
            // =========================================================================
            async function loadProfile() {
                const emailInput = document.getElementById('email');
                emailInput.value = escapeHTML(session.user ? session.user.email : "");

                // Optimsitic Rendering dari Cache atau Sesi
                const cachedProfile = getLocalCache('bakoel_user_profile');
                if (cachedProfile) {
                    document.getElementById('name').value = escapeHTML(cachedProfile.nama_lengkap || "");
                    document.getElementById('nickname').value = escapeHTML(cachedProfile.nama_panggilan || "");
                    document.getElementById('phone').value = escapeHTML(cachedProfile.no_wa || "");
                    document.getElementById('kode_pos').value = escapeHTML(cachedProfile.kode_pos || "");
                    document.getElementById('address').value = escapeHTML(cachedProfile.alamat_lengkap || "");
                    updateAvatarUI(cachedProfile.nama_panggilan || cachedProfile.nama_lengkap || session.name);
                } else {
                    updateAvatarUI(session.name);
                }

                try {
                    const response = await fetch(`${BASE_URL}/api/user`, {
                        method: 'GET',
                        headers: { 
                            'Authorization': `Bearer ${session.access_token}`,
                            'Cache-Control': 'no-cache'
                        }
                    });
                    
                    if (response.status === 401 || response.status === 403) {
                        window.handleLogout();
                        return;
                    }

                    if (!response.ok) throw new Error('Gagal memuat profil');
                    
                    const userData = await response.json();
                    
                    // Normalisasi & Update UI
                    document.getElementById('name').value = escapeHTML(userData.nama_lengkap || "");
                    document.getElementById('nickname').value = escapeHTML(userData.nama_panggilan || "");
                    document.getElementById('phone').value = escapeHTML(userData.no_wa || "");
                    document.getElementById('kode_pos').value = escapeHTML(userData.kode_pos || "");
                    document.getElementById('address').value = escapeHTML(userData.alamat_lengkap || "");
                    emailInput.value = escapeHTML(userData.email || (session.user ? session.user.email : ""));

                    const finalName = escapeHTML(userData.nama_panggilan || (userData.nama_lengkap ? userData.nama_lengkap.split(' ')[0] : session.name));
                    updateAvatarUI(finalName);
                    
                    setLocalCache('bakoel_user_profile', userData, 30 * 60 * 1000);

                } catch (error) {
                    if (!cachedProfile) {
                        showAlert("Gagal menarik data profil terbaru dari server.", "error");
                    }
                }
                
                // Mulai Sinkronisasi Badge
                syncBadges(session.access_token);
            }

            async function syncBadges(token) {
                try {
                    const cartRes = await fetch(`${BASE_URL}/api/cart`, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (cartRes.ok) {
                        const cartItems = await cartRes.json();
                        const totalQty = cartItems.reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);
                        const cb = document.getElementById('cartBadge');
                        const mcb = document.getElementById('mobileCartBadge');
                        if (cb) { cb.style.display = totalQty > 0 ? 'flex' : 'none'; cb.innerText = totalQty > 99 ? '99+' : totalQty; }
                        if (mcb) { mcb.style.display = totalQty > 0 ? 'flex' : 'none'; mcb.innerText = totalQty > 99 ? '99+' : totalQty; }
                    }
                } catch (e) {}

                try {
                    const promoRes = await fetch(`${BASE_URL}/api/vouchers`, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (promoRes.ok) {
                        const promos = await promoRes.json();
                        const pb = document.getElementById('promoBadge');
                        const mpb = document.getElementById('mobilePromoBadge');
                        if (pb) { pb.style.display = promos.length > 0 ? 'flex' : 'none'; pb.innerText = promos.length; }
                        if (mpb) { mpb.style.display = promos.length > 0 ? 'flex' : 'none'; mpb.innerText = promos.length; }
                    }
                } catch (e) {}

                try {
                    const orderRes = await fetch(`${BASE_URL}/api/orders`, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (orderRes.ok) {
                        const orders = await orderRes.json();
                        const activeOrders = orders.filter(o => {
                            const s = String(o.status || '').toLowerCase();
                            return s !== 'selesai' && s !== 'dibatalkan';
                        });
                        const ob = document.getElementById('orderBadge');
                        const mob = document.getElementById('mobileOrderBadge');
                        if (ob) { ob.style.display = activeOrders.length > 0 ? 'flex' : 'none'; ob.innerText = activeOrders.length; }
                        if (mob) { mob.style.display = activeOrders.length > 0 ? 'flex' : 'none'; mob.innerText = activeOrders.length; }
                    }
                } catch (e) {}
            }

            window.addEventListener('DOMContentLoaded', loadProfile);

        })(); // Tutup Pembungkus Keamanan IIFE
    </script>
</body>
</html>
